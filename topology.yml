name: demo-sandbox

hosts:
  - name: host-1
    flavor: standard.small
    base_box:
      image: kali
      mgmt_user: kali
      mgmt_protocol: ssh
    hidden: false
    volumes: []
    extra: {}

  - name: host-2
    flavor: standard.small
    base_box:
      image: ubuntu-noble-x86_64
      mgmt_user: ubuntu
      mgmt_protocol: ssh
    hidden: false
    volumes: []
    extra: {}

routers:
  - name: router-1
    flavor: standard.small
    base_box:
      image: ubuntu-noble-x86_64
      mgmt_user: ubuntu
      mgmt_protocol: ssh
    hidden: false
    extra: {}

wan:
  name: network-1
  cidr: 192.168.10.16/30

networks:
  - name: network-2
    cidr: 192.168.10.0/28
    accessible_by_user: true
    hidden: false

net_mappings:
  - host: host-1
    network: network-2
    ip: 192.168.10.5
  - host: host-2
    network: network-2
    ip: 192.168.10.6

router_mappings:
  - router: router-1
    network: network-2
    ip: 192.168.10.1

groups:
  - name: example1
    nodes:
      - host-2
      - router-1

monitoring_targets:
  - node: host-2
    targets:
      - port: 80
        interface: eth0
